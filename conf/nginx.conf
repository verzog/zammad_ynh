# Zammad - YunoHost NGINX configuration
# Proxies to Zammad's Puma web server (port __PORT__) and WebSocket server (port __PORT_WEBSOCKET__)

# Serve precompiled static assets directly from disk.
# Without this, nginx proxies asset requests to Puma; if the asset is missing
# or Rails is in an error state, Puma returns an HTML page with Content-Type:
# text/html, which browsers reject for CSS/JS under strict MIME checking.
location __PATH__/assets/ {
    alias /opt/zammad/public/assets/;
    expires 1y;
    add_header Cache-Control "public, immutable";
    gzip_static on;
    access_log off;
}

location = __PATH__/favicon.ico {
    alias /opt/zammad/public/favicon.ico;
    access_log off;
}

location __PATH__/ {

    proxy_pass         http://127.0.0.1:__PORT__/;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_read_timeout    300;
    proxy_connect_timeout 300;
    proxy_send_timeout    300;

    # Required for file uploads
    client_max_body_size 50M;

    # Disable buffering for streaming/SSE
    proxy_buffering off;

    # More includes
    include conf.d/yunohost_panel.conf.inc;
    include conf.d/acme-challenge.conf.inc;
}

# WebSocket endpoint for real-time ticket updates
location __PATH__/ws {

    proxy_pass         http://127.0.0.1:__PORT_WEBSOCKET__/ws;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;

    proxy_read_timeout 86400;
}

# Action Cable (Rails WebSocket, used in Zammad 5+)
location __PATH__/cable {

    proxy_pass         http://127.0.0.1:__PORT__/cable;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400;
}
