# Zammad - YunoHost NGINX configuration
# Proxies to Zammad's Puma web server (port __PORT__) and WebSocket server (port __PORT_WEBSOCKET__)

location __PATH__/ {

    proxy_pass         http://127.0.0.1:__PORT__/;

    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_read_timeout    300;
    proxy_connect_timeout 300;
    proxy_send_timeout    300;

    # Required for file uploads
    client_max_body_size 50M;

    # Disable buffering for streaming/SSE
    proxy_buffering off;

    # More includes
    include conf.d/yunohost_panel.conf.inc;
    include conf.d/acme-challenge.conf.inc;
}

# WebSocket endpoint for real-time ticket updates
location __PATH__/ws {

    proxy_pass         http://127.0.0.1:__PORT_WEBSOCKET__/ws;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;

    proxy_read_timeout 86400;
}

# Action Cable (Rails WebSocket, used in Zammad 5+)
location __PATH__/cable {

    proxy_pass         http://127.0.0.1:__PORT__/cable;
    proxy_http_version 1.1;

    proxy_set_header   Upgrade    $http_upgrade;
    proxy_set_header   Connection "Upgrade";
    proxy_set_header   Host       $host;
    proxy_set_header   X-Real-IP  $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_read_timeout 86400;
}
